<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的主页 | 大学生就业分析系统</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #e0e7ff 100%);
      color: #0f172a;
    }
    .container {
      width: min(980px, 92vw);
      margin: 0 auto;
      padding: 28px 0;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    .title { margin: 0; font-size: 28px; }
    .actions { display: flex; gap: 10px; }
    .btn {
      padding: 9px 14px;
      border-radius: 10px;
      text-decoration: none;
      border: 1px solid #cbd5e1;
      color: #334155;
      background: #fff;
      font-size: 14px;
    }
    .btn-primary {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, .1);
      padding: 24px;
    }
    .welcome { margin: 0 0 8px; font-size: 22px; }
    .desc { margin: 0 0 16px; color: #64748b; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
    }
    .item {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 12px;
      background: #f8fafc;
    }
    .item h4 { margin: 0 0 6px; font-size: 15px; }
    .item p { margin: 0; font-size: 13px; color: #64748b; }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h2 class="title">我的主页</h2>
      <div class="actions">
        <a class="btn" href="/dashboard/">返回数据分析</a>
        <a class="btn btn-primary" href="/logout/">退出登录</a>
      </div>
    </div>

    <div class="card">
      <h3 class="welcome">你好，{{ user.username }} 👋</h3>
      <p class="desc">欢迎来到你的个人主页，这里可以作为后续扩展个人收藏职位、搜索历史、偏好设置等功能的入口。</p>

      <div class="grid">
        <div class="item">
          <h4>个人资料</h4>
          <p>查看并完善你的账号信息。</p>
        </div>
        <div class="item">
          <h4>搜索历史</h4>
          <p>后续可在这里查看你检索过的专业关键词。</p>
        </div>
        <div class="item">
          <h4>岗位偏好</h4>
          <p>后续可配置城市、薪资、经验等偏好。</p>
        </div>
        <div class="item">
          <h4>消息通知</h4>
          <p>后续可接收职位更新与系统提醒。</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
