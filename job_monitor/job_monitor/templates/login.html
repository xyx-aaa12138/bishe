<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 | 大学生就业分析系统</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #e0f2fe 100%);
      display: grid;
      place-items: center;
      color: #0f172a;
    }
    .card {
      width: min(92vw, 420px);
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
    }
    h2 { margin: 0 0 8px; font-size: 26px; }
    .subtitle { margin: 0 0 22px; color: #64748b; font-size: 14px; }
    label { display: block; margin: 12px 0 6px; font-size: 14px; color: #334155; }
    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.18);
    }
    .error {
      margin: 10px 0 0;
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
    }
    button {
      width: 100%;
      margin-top: 16px;
      border: 0;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #1d4ed8; }
    .switch {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      color: #64748b;
    }
    .switch a { color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>欢迎登录</h2>
    <p class="subtitle">大学生就业分析系统</p>

    <form method="post">
      {% csrf_token %}
      <label for="username">用户名</label>
      <input id="username" name="username" placeholder="请输入用户名" value="{{ username|default:'' }}" required />

      <label for="password">密码</label>
      <input id="password" name="password" type="password" placeholder="请输入密码" required />

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <button type="submit">登录</button>
    </form>

    <div class="switch">
      还没有账号？<a href="/register/">立即注册</a>
    </div>
  </div>
</body>
</html>
